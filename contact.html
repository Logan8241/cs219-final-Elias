<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact | Academic Portfolio</title>
  <link rel="stylesheet" href="stylesheet.css" />
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="container nav-container">
      <h1 class="logo">Academic Portfolio</h1>

      <nav>
        <div class="logo"><strong>Portfolio</strong></div>
        <ul>
            <li><a href="index.html" class="active">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="blog.html">Blog</a></li>
            <li><a href="resume.html">Resume</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <!-- Contact Section -->
  <section class="contact-page">
    <div class="container">

      <div class="section-title">
        <h2>Contact Me</h2>
        <p>Feel free to reach out for collaborations, research opportunities, or academic discussions.</p>
      </div>

      <div class="contact-wrapper">

        <!-- Contact Info -->
        <div class="contact-info">

          <div class="info-card">
            <h3>Email</h3>
            <p>Logan.Elias245@gmail.com</p>
          </div>

          <div class="info-card">
            <h3>Social Links</h3>

            <ul class="social-links">
              <li><a href="#">LinkedIn</a></li>
              <li><a href="#">GitHub</a></li>
            </ul>
          </div>

          <div class="info-card">
            <h3>Location</h3>

            <iframe
              src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3105.001238235692!2d-77.03687068464918!3d38.89767627957068!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x89b7b7a1b5c6f8cb%3A0x4b5c5f4b7c7b7b7!2sWashington%2C%20DC!5e0!3m2!1sen!2sus!4v1680000000000"
              allowfullscreen=""
              loading="lazy">
            </iframe>

          </div>

        </div>

        <!-- Contact Form -->
        <div class="contact-form-container">

          <form id="contactForm" class="contact-form">

            <div class="form-group">
              <label for="name">Full Name</label>
              <input type="text" id="name" name="name" />
              <small class="error"></small>
            </div>

            <div class="form-group">
              <label for="email">Email Address</label>
              <input type="email" id="email" name="email" />
              <small class="error"></small>
            </div>

            <div class="form-group">
              <label for="subject">Subject</label>
              <input type="text" id="subject" name="subject" />
              <small class="error"></small>
            </div>

            <div class="form-group">
              <label for="message">Message</label>
              <textarea id="message" name="message" rows="6"></textarea>
              <small class="error"></small>
            </div>

            <button type="submit" class="btn-submit">Send Message</button>

            <p id="successMessage" class="success-message"></p>

          </form>

        </div>

      </div>

    </div>
  </section>

  <script src="contact-script.js"></script>
</body>
</html>
